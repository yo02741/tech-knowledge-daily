name: Daily pipeline

on:
  schedule:
    - cron: "7 0 * * *" # 台北 08:07（UTC+8，避開整點尖峰）
  workflow_dispatch:
    inputs:
      date:
        description: "回溯日期 YYYY-MM-DD（留空＝今天；回溯僅 HN 歷史、不寫 ledger）"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  build-report:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.push.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Resolve date
        run: |
          DATE="${{ inputs.date }}"
          [ -n "$DATE" ] || DATE=$(date -u +%F) # 排程在 00:07 UTC＝台北 08:07，兩地同日
          echo "DATE=$DATE" >> "$GITHUB_ENV"
          if [ "$DATE" = "$(date -u +%F)" ]; then
            echo "COMMIT_FLAG=--commit" >> "$GITHUB_ENV"
          else
            echo "COMMIT_FLAG=" >> "$GITHUB_ENV" # 回溯日乾跑，不污染 ledger
          fi

      - name: Fetch sources（exit 2＝部分來源失敗/回溯模式，可續）
        run: |
          set +e
          bash scripts/fetch_all.sh "$DATE"
          rc=$?
          set -e
          if [ "$rc" != 0 ] && [ "$rc" != 2 ]; then exit "$rc"; fi

      - name: Analyze + 模板報告 + 校驗
        run: |
          uv run scripts/trend_state.py analyze --date "$DATE" $COMMIT_FLAG
          uv run scripts/gen_report.py --date "$DATE"
          uv run scripts/publish.py

      - name: Store to Firestore（best-effort，不擋管線）
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: uv run scripts/store_firestore.py --date "$DATE"

      - name: Commit & push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data data/state
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "無變更，不 push"
          else
            git commit -m "report(ci): $DATE 每日管線"
            # CI 跑到一半使用者也 push 的競態：rebase 後重試一次
            for i in 1 2; do
              git push && break
              [ "$i" = 2 ] && exit 1
              git pull --rebase origin main
            done
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  # GITHUB_TOKEN 的 push 不會觸發其他 workflow，這裡直接串部署
  deploy:
    needs: build-report
    if: needs.build-report.outputs.pushed == 'true'
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
