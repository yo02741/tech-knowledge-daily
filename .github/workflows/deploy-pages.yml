name: Deploy sites # GitHub Pages + Firebase Hosting 雙部署

on:
  push:
    branches: [main]
    paths:
      - "site/data/**"
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:
  workflow_call: # daily-pipeline push 完後直接串（GITHUB_TOKEN 的 push 不觸發 on.push）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main # workflow_call 時 context sha 是 CI commit 前的，固定抓最新 main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend into site/
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # Pages 後端間歇性「Deployment failed, try again later」（2026-07-06 實測
      # 成功率約五成），失敗自動補打兩槍
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - id: retry1
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - if: steps.deployment.outcome == 'failure' && steps.retry1.outcome == 'failure'
        uses: actions/deploy-pages@v4

  deploy-firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend into site/
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "無 FIREBASE_SERVICE_ACCOUNT secret，跳過 Firebase Hosting"
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools@14 deploy --only hosting --non-interactive
